# Documentazione di default con best practices
# This workflow will install Python dependencies, run tests and lint 
# with a slim version of Python
# For more information see: 
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Machine Innovation CI Pipeline

on:
  push:
    # To Begin with set the trigger only on dev branch.
    # So we can safe minutes of build
    # branches: [ "main" ]
    branches: [ "dev-ci-cd" ] # per Testare solo in dev all'inizio
  pull_request:
    #branches: [ "main" ]
    branches: [ "dev-ci-cd" ] # per Testare solo in dev 

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        working-directory: "ci_cd/CI"
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest 
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        working-directory: "."
        run: |
          chmod +x ./run_test_ci.sh
          ./run_test_ci.sh

      - name: Build Docker Image (Test)
        run: |
          docker build -f ci_cd/Dockerfile -t machine-innovation-app:latest .