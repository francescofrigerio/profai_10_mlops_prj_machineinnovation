name: Update graphs on README.md

on:
  push:
    paths:
      - 'src/outputs-baseline-prod/**/*.db'
      - 'src/outputs-baseline-prod/*.db'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-charts:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Scarica il codice del repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configura i permessi ed esegui lo script del DB
    - name: Esegui install_db.sh
      run: |
        chmod +x ./install_db.sh
        sudo ./install_db.sh src/outputs-baseline-prod/metrics_prod.db
        sudo chmod -R 777 /opt/machineinnovation/

    # 3. Avvia Grafana
    - name: Avvia Grafana
      working-directory: ./monitoring
      run: docker compose up -d grafana

    # 4. Attendi che Grafana sia pronto stabilmente
    - name: Wait start
      run: sleep 60

    # 5. Configura l'ambiente Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' 
        cache: 'pip'

    # 6. Installa Playwright e Chromium
    - name: Installa dipendenze e Playwright
      run: |
        pip install playwright 
        playwright install chromium --with-deps

    # 7. Rimuove le vecchie immagini e cattura i nuovi Screenshot
    - name: Catch Screenshot Dashboard
      run: |
        rm -f ./images/dashboard_table.png
        rm -f ./images/dashboard_timeseries.png
        python ./monitoring/rend_dashboard_panel.py
        
    # 8. [DEBUG] Verifica i percorsi di output
    - name: Debug Images check
      run: |
        echo "=== Contenuto della Root ==?"
        ls -lrt
        echo "=== Contenuto di ./images/ ==="
        ls -lrt ./images/ || true
        echo "=== Contenuto di ./monitoring/ ==="
        ls -lrt ./monitoring/ || true
        
    # 9. Spegni i container Docker 
    - name: Stop Docker
      working-directory: ./monitoring
      run: docker compose down

    # 10. Commit e Push sul repository
    - name: Commit + Push of the update graph 
      run: |
        git config --local user.name "francescofrigerio"
        git config --local user.email "francesco.frigerio@greencore.it"
        git add ./images/dashboard_table.png
        git add ./images/dashboard_timeseries.png
        git commit -m "Auto: Aggiornato grafico di training [skip ci]" || exit 0
        git push